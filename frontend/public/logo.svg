<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Decorative icon: stylized arch/doorway -->
  <g transform="translate(6, 4)">
    <!-- Outer arch -->
    <path d="M24 48 L24 20 Q24 4 12 4 Q0 4 0 20 L0 48" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M36 48 L36 20 Q36 0 18 0 Q0 0 0 20" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Inner door -->
    <rect x="8" y="24" width="20" height="24" rx="10" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="1.5"/>
    <!-- Door handle -->
    <circle cx="22" cy="38" r="1.8" fill="#fff"/>
    <!-- Keystone accent -->
    <circle cx="18" cy="6" r="2" fill="#fff" opacity="0.6"/>
    <!-- Window above door -->
    <path d="M12 20 Q18 14 24 20" stroke="#fff" stroke-width="1.2" fill="none" opacity="0.5"/>
  </g>
  <!-- Text: Alt-Berliner -->
  <text x="52" y="24" font-family="'Playfair Display', 'DM Serif Display', Georgia, serif" font-size="19" font-weight="700" fill="#ffffff" letter-spacing="1.5">ALT-BERLINER</text>
  <!-- Text: Eckkneipe -->
  <text x="52" y="46" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="4">ECKKNEIPE</text>
  <!-- Thin decorative line between texts -->
  <line x1="52" y1="30" x2="115" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
</svg>
